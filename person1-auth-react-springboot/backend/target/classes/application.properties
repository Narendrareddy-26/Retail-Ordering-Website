spring.application.name=auth-service
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.datasource.url=jdbc:h2:mem:retail_db
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
spring.jpa.hibernate.ddl-auto=create
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# Server Configuration
server.port=8081
server.servlet.context-path=/

# JWT Configuration
jwt.secret=MyVeryLongSecretKeyForHS512AlgorithmThatIs64CharactersLongForSecure
jwt.expiration=86400000

# Logging
logging.level.root=INFO
logging.level.com.retail.auth=DEBUG

# Application Configuration
spring.application.display-name=Retail Auth Service
